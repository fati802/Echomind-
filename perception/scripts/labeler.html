<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EchoMind Local Labeler</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; margin: 0; background: #1e1e24; color: #eee; }
  #topbar { display: flex; align-items: center; gap: 16px; padding: 10px 16px; background: #16161b; border-bottom: 1px solid #333; }
  #topbar h1 { font-size: 16px; margin: 0; color: #9ad; }
  #status { margin-left: auto; font-size: 13px; color: #aaa; }
  #main { display: flex; height: calc(100vh - 48px); }
  #canvasWrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto; background: #101014; position: relative; }
  canvas { cursor: crosshair; border: 1px solid #444; }
  #sidebar { width: 280px; background: #16161b; border-left: 1px solid #333; padding: 12px; overflow-y: auto; }
  #sidebar h2 { font-size: 13px; text-transform: uppercase; color: #888; margin: 16px 0 8px; }
  #sidebar h2:first-child { margin-top: 0; }
  .classBtn { display: block; width: 100%; text-align: left; padding: 8px 10px; margin-bottom: 4px; background: #222; border: 1px solid #333; color: #eee; border-radius: 4px; cursor: pointer; font-size: 13px; }
  .classBtn.active { background: #2d5a8a; border-color: #4a90d9; }
  .classBtn .key { float: right; color: #888; font-size: 11px; }
  #boxList { font-size: 12px; }
  .boxItem { display: flex; justify-content: space-between; align-items: center; padding: 4px 6px; margin-bottom: 3px; background: #222; border-radius: 3px; }
  .boxItem button { background: none; border: none; color: #e77; cursor: pointer; font-size: 12px; }
  #nav { display: flex; gap: 8px; margin-top: 12px; }
  #nav button { flex: 1; padding: 8px; background: #2d5a8a; border: none; color: white; border-radius: 4px; cursor: pointer; }
  #nav button:hover { background: #3a6fa5; }
  #imgList { font-size: 11px; max-height: 160px; overflow-y: auto; background: #101014; border-radius: 4px; padding: 4px; }
  .imgItem { padding: 3px 6px; cursor: pointer; border-radius: 3px; }
  .imgItem:hover { background: #2a2a33; }
  .imgItem.current { background: #2d5a8a; }
  .imgItem.done::after { content: " ✓"; color: #7c7; }
  #help { font-size: 11px; color: #888; line-height: 1.6; margin-top: 12px; }
  kbd { background: #333; padding: 1px 5px; border-radius: 3px; font-size: 10px; }
</style>
</head>
<body>
<div id="topbar">
  <h1>EchoMind Local Labeler</h1>
  <div id="status">Loading...</div>
</div>
<div id="main">
  <div id="canvasWrap">
    <canvas id="canvas"></canvas>
  </div>
  <div id="sidebar">
    <h2>Classes</h2>
    <div id="classButtons"></div>

    <h2>Boxes on this image</h2>
    <div id="boxList"></div>

    <div id="nav">
      <button id="prevBtn">&larr; Prev</button>
      <button id="nextBtn">Next &rarr;</button>
    </div>

    <h2>Images (<span id="imgCount"></span>)</h2>
    <div id="imgList"></div>

    <div id="help">
      <div><kbd>1</kbd>-<kbd>5</kbd> select class</div>
      <div>Drag on image to draw box</div>
      <div><kbd>Ctrl+S</kbd> save (also auto-saves on nav)</div>
      <div><kbd>D</kbd> next &nbsp; <kbd>A</kbd> prev</div>
      <div><kbd>Backspace</kbd> delete last box</div>
    </div>
  </div>
</div>

<script>
let classes = [];
let images = [];
let labeledSet = new Set();
let currentIdx = 0;
let currentClass = 0;
let boxes = []; // {cls, x1, y1, x2, y2} in image pixel coords
let img = new Image();
let drawing = false;
let startX, startY;
let scale = 1;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');

async function init() {
  const [classesRes, imagesRes] = await Promise.all([
    fetch('/api/classes').then(r => r.json()),
    fetch('/api/images').then(r => r.json())
  ]);
  classes = classesRes.classes;
  images = imagesRes.images;
  labeledSet = new Set(imagesRes.labeled);

  renderClassButtons();
  renderImgList();
  loadImage(0);
}

function renderClassButtons() {
  const wrap = document.getElementById('classButtons');
  wrap.innerHTML = '';
  classes.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'classBtn' + (i === currentClass ? ' active' : '');
    btn.innerHTML = `${c} <span class="key">${i + 1}</span>`;
    btn.onclick = () => { currentClass = i; renderClassButtons(); };
    wrap.appendChild(btn);
  });
}

function renderImgList() {
  const wrap = document.getElementById('imgList');
  wrap.innerHTML = '';
  document.getElementById('imgCount').textContent = images.length;
  images.forEach((name, i) => {
    const div = document.createElement('div');
    const stem = name.replace(/\.(jpg|jpeg|png)$/i, '');
    div.className = 'imgItem' + (i === currentIdx ? ' current' : '') + (labeledSet.has(stem) ? ' done' : '');
    div.textContent = name;
    div.onclick = () => loadImage(i);
    wrap.appendChild(div);
  });
}

async function loadImage(idx) {
  if (idx < 0 || idx >= images.length) return;
  await saveCurrentLabels(); // autosave previous before switching

  currentIdx = idx;
  const name = images[idx];
  const stem = name.replace(/\.(jpg|jpeg|png)$/i, '');

  img = new Image();
  img.onload = async () => {
    const maxW = window.innerWidth - 320;
    const maxH = window.innerHeight - 80;
    scale = Math.min(maxW / img.width, maxH / img.height, 1);
    canvas.width = img.width * scale;
    canvas.height = img.height * scale;

    // load existing labels
    const labelRes = await fetch(`/api/label/${stem}`).then(r => r.json());
    boxes = [];
    labelRes.content.trim().split('\n').filter(l => l.trim()).forEach(line => {
      const [cls, cx, cy, w, h] = line.trim().split(/\s+/).map(Number);
      const x1 = (cx - w / 2) * img.width;
      const y1 = (cy - h / 2) * img.height;
      const x2 = (cx + w / 2) * img.width;
      const y2 = (cy + h / 2) * img.height;
      boxes.push({ cls, x1, y1, x2, y2 });
    });

    redraw();
    renderBoxList();
    renderImgList();
    statusEl.textContent = `${idx + 1} / ${images.length} — ${name}`;
  };
  img.src = `/images/${name}`;
}

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  boxes.forEach((b, i) => drawBox(b, i));
}

function drawBox(b, idx) {
  const x = Math.min(b.x1, b.x2) * scale;
  const y = Math.min(b.y1, b.y2) * scale;
  const w = Math.abs(b.x2 - b.x1) * scale;
  const h = Math.abs(b.y2 - b.y1) * scale;
  ctx.strokeStyle = colorForClass(b.cls);
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);
  ctx.fillStyle = colorForClass(b.cls);
  ctx.font = '13px sans-serif';
  const label = classes[b.cls] || '?';
  const tw = ctx.measureText(label).width;
  ctx.fillRect(x, y - 16, tw + 8, 16);
  ctx.fillStyle = '#fff';
  ctx.fillText(label, x + 4, y - 4);
}

function colorForClass(cls) {
  const colors = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6'];
  return colors[cls % colors.length];
}

function renderBoxList() {
  const wrap = document.getElementById('boxList');
  wrap.innerHTML = '';
  if (boxes.length === 0) {
    wrap.innerHTML = '<div style="color:#666">No boxes yet</div>';
    return;
  }
  boxes.forEach((b, i) => {
    const div = document.createElement('div');
    div.className = 'boxItem';
    div.innerHTML = `<span>${classes[b.cls]}</span>`;
    const del = document.createElement('button');
    del.textContent = '✕';
    del.onclick = () => { boxes.splice(i, 1); redraw(); renderBoxList(); };
    div.appendChild(del);
    wrap.appendChild(div);
  });
}

canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  startX = (e.clientX - rect.left) / scale;
  startY = (e.clientY - rect.top) / scale;
  drawing = true;
});

canvas.addEventListener('mousemove', (e) => {
  if (!drawing) return;
  const rect = canvas.getBoundingClientRect();
  const curX = (e.clientX - rect.left) / scale;
  const curY = (e.clientY - rect.top) / scale;
  redraw();
  ctx.strokeStyle = colorForClass(currentClass);
  ctx.lineWidth = 2;
  ctx.strokeRect(Math.min(startX, curX) * scale, Math.min(startY, curY) * scale, Math.abs(curX - startX) * scale, Math.abs(curY - startY) * scale);
});

canvas.addEventListener('mouseup', (e) => {
  if (!drawing) return;
  drawing = false;
  const rect = canvas.getBoundingClientRect();
  const endX = (e.clientX - rect.left) / scale;
  const endY = (e.clientY - rect.top) / scale;
  if (Math.abs(endX - startX) > 5 && Math.abs(endY - startY) > 5) {
    boxes.push({ cls: currentClass, x1: startX, y1: startY, x2: endX, y2: endY });
    renderBoxList();
  }
  redraw();
});

async function saveCurrentLabels() {
  if (!images.length) return;
  const stem = images[currentIdx].replace(/\.(jpg|jpeg|png)$/i, '');
  const lines = boxes.map(b => {
    const cx = ((b.x1 + b.x2) / 2) / img.width;
    const cy = ((b.y1 + b.y2) / 2) / img.height;
    const w = Math.abs(b.x2 - b.x1) / img.width;
    const h = Math.abs(b.y2 - b.y1) / img.height;
    return `${b.cls} ${cx.toFixed(6)} ${cy.toFixed(6)} ${w.toFixed(6)} ${h.toFixed(6)}`;
  });
  await fetch('/api/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ stem, lines })
  });
  if (lines.length > 0) labeledSet.add(stem);
}

document.addEventListener('keydown', (e) => {
  if (e.key >= '1' && e.key <= '9') {
    const idx = parseInt(e.key) - 1;
    if (idx < classes.length) { currentClass = idx; renderClassButtons(); }
  } else if (e.key === 'd' || e.key === 'D') {
    loadImage(currentIdx + 1);
  } else if (e.key === 'a' || e.key === 'A') {
    loadImage(currentIdx - 1);
  } else if (e.key === 'Backspace') {
    if (boxes.length > 0) { boxes.pop(); redraw(); renderBoxList(); }
  } else if (e.ctrlKey && e.key === 's') {
    e.preventDefault();
    saveCurrentLabels();
  }
});

document.getElementById('nextBtn').onclick = () => loadImage(currentIdx + 1);
document.getElementById('prevBtn').onclick = () => loadImage(currentIdx - 1);

window.addEventListener('beforeunload', () => { saveCurrentLabels(); });

init();
</script>
</body>
</html>
